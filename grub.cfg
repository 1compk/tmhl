set default=0
set timeout=5
set gfxmode=1024x768x16
set gfxpayload=1024x768x16,1024x768
set message="Loading kernel and ramdisk..."

menuentry "Resume previous session" --class resume {
    echo $message
    echo Searching... /minios/boot/initrfs.img
search --file --no-floppy --set=root /minios/boot/vmlinuz
    set gfxpayload=$gfxpayload
    linux /minios/boot/vmlinuz boot=live load_ramdisk=1 prompt_ramdisk=0 rw printk.time=0 consoleblank=0 net.ifnames=0 biosdevname=0 nottyautologin perchdir=resume
    initrd /minios/boot/initrfs.img
}
