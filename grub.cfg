menuentry "Uefi - Windows Boot Manager (/EFI/Microsoft/Boot/bootmgfw.efi)" --class windows {
    echo Searching... /EFI/Microsoft/Boot/bootmgfw.efi
search --file --no-floppy --set=root /EFI/Microsoft/Boot/bootmgfw.efi

    echo Loading... kernel
chainloader (${root})/EFI/Microsoft/Boot/bootmgfw.efi

    echo Booting... /EFI/Microsoft/Boot/bootmgfw.efi
boot
}